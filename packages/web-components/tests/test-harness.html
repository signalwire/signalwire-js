<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Components Test Harness</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    #test-container {
      width: 100%;
      max-width: 1280px;
      height: 720px;
      margin: 0 auto;
      background: #000;
      border: 1px solid #333;
      position: relative;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      background: #044cf6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #0339c4;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>UI Components Test Harness</h1>

  <div id="test-container"></div>

  <div class="controls">
    <button id="btn-create-components">Create Components</button>
    <button id="btn-set-remote-stream">Set Remote Stream</button>
    <button id="btn-set-local-stream">Set Local Stream</button>
    <button id="btn-update-layout">Update Layout</button>
    <button id="btn-toggle-visibility">Toggle Visibility</button>
    <button id="btn-cleanup">Cleanup</button>
  </div>

  <div class="status" id="status">Ready</div>

  <!-- Load RxJS -->
  <script src="https://unpkg.com/rxjs@7/dist/bundles/rxjs.umd.min.js"></script>

  <!-- Load UI Components -->
  <script type="module">
    import * as UIComponents from '/src/index.ts';

    // Expose for testing
    window.UIComponents = UIComponents;

    // Test fixtures
    const { BehaviorSubject } = rxjs;

    function createMockMediaStream(options = {}) {
      const { hasVideo = true, hasAudio = true, videoWidth = 1920, videoHeight = 1080 } = options;
      const tracks = [];

      if (hasVideo) {
        const canvas = document.createElement('canvas');
        canvas.width = videoWidth;
        canvas.height = videoHeight;
        const ctx = canvas.getContext('2d');
        if (ctx) {
          // Draw colorful pattern for visibility
          ctx.fillStyle = '#044cf6';
          ctx.fillRect(0, 0, videoWidth, videoHeight);
          ctx.fillStyle = '#fff';
          ctx.font = '48px sans-serif';
          ctx.fillText('Test Video Stream', 50, videoHeight / 2);
        }
        const stream = canvas.captureStream(30);
        const videoTrack = stream.getVideoTracks()[0];
        if (videoTrack) tracks.push(videoTrack);
      }

      if (hasAudio) {
        try {
          const audioContext = new AudioContext();
          const oscillator = audioContext.createOscillator();
          const dest = audioContext.createMediaStreamDestination();
          oscillator.connect(dest);
          oscillator.frequency.value = 0;
          oscillator.start();
          const audioTrack = dest.stream.getAudioTracks()[0];
          if (audioTrack) tracks.push(audioTrack);
        } catch (e) {
          console.warn('Could not create audio track:', e);
        }
      }

      return new MediaStream(tracks);
    }

    function createMockLayoutLayer(options = {}) {
      return {
        layer_index: 0,
        z_index: 0,
        member_id: undefined,
        playing_file: false,
        position: 'auto',
        reservation: '',
        visible: true,
        x: 0,
        y: 0,
        width: 100,
        height: 100,
        ...options,
      };
    }

    function createMockCall(options = {}) {
      const {
        selfId = 'self-user',
        initialRemoteStream = null,
        initialLocalStream = null,
        initialLayoutLayers = [],
      } = options;

      return {
        self: selfId ? { id: selfId } : undefined,
        remoteStream$: new BehaviorSubject(initialRemoteStream),
        localStream$: new BehaviorSubject(initialLocalStream),
        layoutLayers$: new BehaviorSubject(initialLayoutLayers),
      };
    }

    function createTestParticipantsLayout(selfId) {
      return [
        createMockLayoutLayer({
          member_id: selfId,
          x: 75,
          y: 75,
          width: 20,
          height: 20,
          layer_index: 0,
          z_index: 10,
        }),
        createMockLayoutLayer({
          member_id: 'participant-1',
          x: 0,
          y: 0,
          width: 50,
          height: 50,
          layer_index: 1,
          z_index: 1,
        }),
        createMockLayoutLayer({
          member_id: 'participant-2',
          x: 50,
          y: 0,
          width: 50,
          height: 50,
          layer_index: 2,
          z_index: 2,
        }),
        createMockLayoutLayer({
          member_id: 'participant-3',
          x: 0,
          y: 50,
          width: 50,
          height: 50,
          layer_index: 3,
          z_index: 3,
        }),
      ];
    }

    // Create mock audio stream with oscillator for audio level testing
    function createMockAudioStream(options = {}) {
      const { frequency = 440, volume = 0.5 } = options;
      try {
        const audioContext = new AudioContext();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        const dest = audioContext.createMediaStreamDestination();

        oscillator.frequency.value = frequency;
        gainNode.gain.value = volume;

        oscillator.connect(gainNode);
        gainNode.connect(dest);
        oscillator.start();

        // Return stream with context for control
        const stream = dest.stream;
        stream._audioContext = audioContext;
        stream._oscillator = oscillator;
        stream._gainNode = gainNode;
        return stream;
      } catch (e) {
        console.warn('Could not create audio stream:', e);
        return null;
      }
    }

    // Create mock SelfParticipant for call controls testing
    function createMockSelfParticipant(options = {}) {
      const {
        id = 'self-user',
        audioMuted = false,
        videoMuted = false,
        screenShareStatus = 'inactive',
      } = options;

      const audioMuted$ = new BehaviorSubject(audioMuted);
      const videoMuted$ = new BehaviorSubject(videoMuted);
      const screenShareStatus$ = new BehaviorSubject(screenShareStatus);

      return {
        id,
        audioMuted$,
        videoMuted$,
        screenShareStatus$,
        mute: async () => {
          audioMuted$.next(true);
          console.log('Audio muted');
        },
        unmute: async () => {
          audioMuted$.next(false);
          console.log('Audio unmuted');
        },
        muteVideo: async () => {
          videoMuted$.next(true);
          console.log('Video muted');
        },
        unmuteVideo: async () => {
          videoMuted$.next(false);
          console.log('Video unmuted');
        },
        startScreenShare: async () => {
          screenShareStatus$.next('active');
          console.log('Screen share started');
        },
        stopScreenShare: async () => {
          screenShareStatus$.next('inactive');
          console.log('Screen share stopped');
        },
      };
    }

    // Create mock Call with controls support
    function createMockCallWithControls(options = {}) {
      const {
        selfId = 'self-user',
        initialRemoteStream = null,
        initialLocalStream = null,
        initialLayoutLayers = [],
        capabilities = ['selfMuteAudio', 'selfMuteVideo', 'screenShare'],
      } = options;

      const self = createMockSelfParticipant({ id: selfId });
      const capabilities$ = new BehaviorSubject(capabilities);

      return {
        self,
        remoteStream$: new BehaviorSubject(initialRemoteStream),
        localStream$: new BehaviorSubject(initialLocalStream),
        layoutLayers$: new BehaviorSubject(initialLayoutLayers),
        capabilities$,
        hangup: async () => {
          console.log('Call ended');
        },
      };
    }

    // Create mock DeviceController for device selector testing
    function createMockDeviceController(options = {}) {
      const {
        audioInputDevices = [
          { deviceId: 'mic-1', label: 'Built-in Microphone', kind: 'audioinput' },
          { deviceId: 'mic-2', label: 'USB Microphone', kind: 'audioinput' },
          { deviceId: 'mic-3', label: 'Bluetooth Headset Microphone', kind: 'audioinput' },
        ],
        videoInputDevices = [
          { deviceId: 'cam-1', label: 'Built-in Webcam', kind: 'videoinput' },
          { deviceId: 'cam-2', label: 'USB Camera', kind: 'videoinput' },
        ],
        audioOutputDevices = [
          { deviceId: 'spk-1', label: 'Built-in Speakers', kind: 'audiooutput' },
          { deviceId: 'spk-2', label: 'Bluetooth Headset', kind: 'audiooutput' },
          { deviceId: 'spk-3', label: 'HDMI Audio Output', kind: 'audiooutput' },
        ],
      } = options;

      const selectedAudioInput = new BehaviorSubject(audioInputDevices[0] || null);
      const selectedVideoInput = new BehaviorSubject(videoInputDevices[0] || null);
      const selectedAudioOutput = new BehaviorSubject(audioOutputDevices[0] || null);

      return {
        audioInputDevices$: new BehaviorSubject(audioInputDevices),
        videoInputDevices$: new BehaviorSubject(videoInputDevices),
        audioOutputDevices$: new BehaviorSubject(audioOutputDevices),
        selectedAudioInputDevice$: selectedAudioInput,
        selectedVideoInputDevice$: selectedVideoInput,
        selectedAudioOutputDevice$: selectedAudioOutput,
        selectAudioInputDevice: (device) => {
          selectedAudioInput.next(device);
          console.log('Selected audio input:', device.label);
        },
        selectVideoInputDevice: (device) => {
          selectedVideoInput.next(device);
          console.log('Selected video input:', device.label);
        },
        selectAudioOutputDevice: (device) => {
          selectedAudioOutput.next(device);
          console.log('Selected audio output:', device.label);
        },
      };
    }

    // Expose test fixtures
    window.testFixtures = {
      createMockMediaStream,
      createMockLayoutLayer,
      createMockCall,
      createTestParticipantsLayout,
      createMockAudioStream,
      createMockDeviceController,
      createMockSelfParticipant,
      createMockCallWithControls,
    };

    // Interactive controls
    let mockCall = null;
    let callMedia = null;

    function log(message) {
      document.getElementById('status').textContent = message;
      console.log(message);
    }

    document.getElementById('btn-create-components').addEventListener('click', () => {
      const container = document.getElementById('test-container');
      container.innerHTML = '';

      callMedia = document.createElement('sw-call-media');
      const participants = document.createElement('sw-participants');
      const selfMedia = document.createElement('sw-self-media');
      selfMedia.mirror = true;

      participants.appendChild(selfMedia);
      callMedia.appendChild(participants);
      container.appendChild(callMedia);

      mockCall = createMockCall({ selfId: 'self-user' });
      callMedia.call = mockCall;

      log('Components created');
    });

    document.getElementById('btn-set-remote-stream').addEventListener('click', () => {
      if (!mockCall) return log('Create components first');
      const stream = createMockMediaStream({ videoWidth: 1920, videoHeight: 1080 });
      mockCall.remoteStream$.next(stream);
      log('Remote stream set');
    });

    document.getElementById('btn-set-local-stream').addEventListener('click', () => {
      if (!mockCall) return log('Create components first');
      const stream = createMockMediaStream({ videoWidth: 640, videoHeight: 480 });
      mockCall.localStream$.next(stream);
      log('Local stream set');
    });

    document.getElementById('btn-update-layout').addEventListener('click', () => {
      if (!mockCall) return log('Create components first');
      mockCall.layoutLayers$.next(createTestParticipantsLayout('self-user'));
      log('Layout updated');
    });

    document.getElementById('btn-toggle-visibility').addEventListener('click', () => {
      if (!mockCall) return log('Create components first');
      const current = mockCall.layoutLayers$.getValue();
      if (current.length > 1) {
        current[1].visible = !current[1].visible;
        mockCall.layoutLayers$.next([...current]);
        log(`Participant 1 visible: ${current[1].visible}`);
      }
    });

    document.getElementById('btn-cleanup').addEventListener('click', () => {
      const container = document.getElementById('test-container');
      container.innerHTML = '';
      mockCall = null;
      callMedia = null;
      log('Cleaned up');
    });

    log('Test harness ready');
  </script>
</body>
</html>
